# Database Configuration
database:
  server: ""
  database: ""
  driver: "ODBC Driver 17 for SQL Server"
  port: 1433
  trust_server_certificate: true
  username: ""
  password: ""

# OpenAI Configuration
openai:
  api_key: "sk-"
